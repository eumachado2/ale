<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Alessandra Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: #fff; }

        header {
            background-color: #000;
            padding: 1.5rem 5%;
            border-bottom: 2px solid #D4AF37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: #fff; text-transform: uppercase; text-decoration: none; }
        .logo span { color: #D4AF37; }

        .container { padding: 50px 5%; }
        h1 { color: #D4AF37; margin-bottom: 30px; text-align: center; }

        #grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card-produto {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: 0.3s;
        }

        .card-produto:hover { border-color: #D4AF37; }
        .card-produto img { width: 100%; border-radius: 5px; height: 180px; object-fit: cover; }
        .card-produto h3 { margin: 15px 0 10px; font-size: 1.1rem; }
        .card-produto .preco { color: #D4AF37; font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; }

        .btn-whats {
            display: block;
            background-color: #D4AF37;
            color: #000;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-whats:hover { background-color: #fff; }

        .voltar { display: inline-block; margin-bottom: 20px; color: #D4AF37; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Alessandra <span>Store</span></a>
    </header>

    <div class="container">
        <a href="index.html" class="voltar">← Voltar para Início</a>
        <h1>Nosso Catálogo <span>Completo</span></h1>

        <div id="grid-produtos">
            </div>
    </div>

    <script>
        const produtos = [
            { nome: "Mouse Gamer Gold", preco: "R$ 259,00", img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?auto=format&fit=crop&w=400&q=80" },
            { nome: "Teclado Mecânico", preco: "R$ 580,00", img: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?auto=format&fit=crop&w=400&q=80" },
            { nome: "Headset Elite", preco: "R$ 420,00", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80" },
            { nome: "Placa RTX 4090", preco: "R$ 9.500,00", img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?auto=format&fit=crop&w=400&q=80" },
            { nome: "Monitor 144hz", preco: "R$ 1.250,00", img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?auto=format&fit=crop&w=400&q=80" },
            { nome: "Cadeira Gamer", preco: "R$ 1.100,00", img: "https://images.unsplash.com/photo-1598550476439-6847785fce6e?auto=format&fit=crop&w=400&q=80" }
        ];

        const grid = document.getElementById('grid-produtos');

        produtos.forEach(p => {
            grid.innerHTML += `
                <div class="card-produto">
                    <img src="${p.img}" alt="${p.nome}">
                    <h3>${p.nome}</h3>
                    <p class="preco">${p.preco}</p>
                    <a href="#" class="btn-whats">Comprar Agora</a>
                </div>
            `;
        });
    </script>
</body>
</html>
